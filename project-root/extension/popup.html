<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Review Insights</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body id="body" class="light">
  <div class="shell">
    <header class="header">
      <div>
        <p class="eyebrow">Sentiment dashboard</p>
        <h2>Review Insights</h2>
      </div>
      <button id="toggleTheme" class="icon-btn" type="button" aria-label="Toggle theme">&#9790;</button>
    </header>

    <button id="analyzeBtn" class="primary-btn" type="button">Analyze Reviews</button>
    <p id="summary" class="status">Click analyze to scan reviews on this page.</p>

    <section id="result" class="card">
      <div class="chart-row">
        <canvas id="chart" width="180" height="180"></canvas>
        <div class="legend">
          <span><i class="dot positive-dot"></i>Positive</span>
          <span><i class="dot neutral-dot"></i>Neutral</span>
          <span><i class="dot negative-dot"></i>Negative</span>
        </div>
      </div>

      <div class="meter-list">
        <div class="bar">
          <div class="bar-label"><span>Positive</span><strong id="positive">0%</strong></div>
          <div class="progress"><div id="posBar"></div></div>
        </div>

        <div class="bar">
          <div class="bar-label"><span>Neutral</span><strong id="neutral">0%</strong></div>
          <div class="progress"><div id="neuBar"></div></div>
        </div>

        <div class="bar">
          <div class="bar-label"><span>Negative</span><strong id="negative">0%</strong></div>
          <div class="progress"><div id="negBar"></div></div>
        </div>
      </div>
    </section>

    <section id="insights" class="card">
      <h3>Insights</h3>

      <div class="insight-grid">
        <div class="insight-block">
          <strong>What users like</strong>
          <ul id="goodAspects">
            <li>No data yet</li>
          </ul>
        </div>

        <div class="insight-block">
          <strong>What users dislike</strong>
          <ul id="badAspects">
            <li>No data yet</li>
          </ul>
        </div>
      </div>

      <div class="recommendation-box">
        <strong>&#11088; Recommendation</strong>
        <p id="recommendation">Run analysis to see the recommendation.</p>
      </div>
    </section>
  </div>

  <script src="popup.js" defer></script>
</body>
</html>
